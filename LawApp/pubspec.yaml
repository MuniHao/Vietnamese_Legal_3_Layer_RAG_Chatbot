name: law_app
description: "AI-powered legal consultation app for Vietnamese law"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # HTTP client
  dio: ^5.3.2
  
  # Secure storage
  flutter_secure_storage: ^9.0.0
  
  # Speech to text
  speech_to_text: ^7.3.0
  
  # Internationalization
  intl: ^0.18.1
  
  # UI components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  
  # Navigation
  go_router: ^12.1.3
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Date formatting
  timeago: ^3.6.0
  
  # HTML rendering
  flutter_html: ^3.0.0
  webview_flutter: ^4.4.2
  
  # PDF viewer
  syncfusion_flutter_pdfviewer: ^31.1.19
  
  # File sharing and path
  share_plus: ^7.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/LegalMateCTU.jpg
    - assets/images/
    - assets/icons/
  
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
  #       - asset: fonts/Roboto-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Attached_image.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
